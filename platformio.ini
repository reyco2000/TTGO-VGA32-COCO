; =============================================================================
; platformio.ini — TTGO-VGA32-COCO (CoCo 2 / CoCo 3 Emulator)
; Board: LilyGo TTGO VGA32 v1.4 (ESP32-WROVER-E, 4 MB PSRAM, 4 MB Flash)
;
; ATENÇÃO: O projeto original usa Arduino-CLI + esp32:esp32@2.0.17
; FabGL 1.0.9 NÃO é compatível com arduino-esp32 core 3.x (ESP-IDF 5).
; Por isso usamos espressif32@3.5.0 aqui (framework Arduino sobre IDF 4.4).
;
; Se der problema de FabGL, o método oficial do autor é:
;   arduino-cli compile --fqbn esp32:esp32:esp32wrover:PartitionScheme=huge_app
; =============================================================================

[env:pico32]

; --- Platform ---
; Mantém IDF 4.x para compatibilidade com FabGL 1.0.9
platform    = espressif32@3.5.0
board       = pico32
framework   = arduino

; --- Flash / PSRAM ---
; huge_app = 3 MB de app + 1 MB SPIFFS, sem OTA
; Equivalente a --fqbn esp32:esp32:esp32wrover:PartitionScheme=huge_app
board_build.partitions = huge_app.csv

; PSRAM habilitado (ESP32-WROVER-E / PICO-D4)
board_build.arduino.memory_type = qio_opi

; --- Monitor ---
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; --- Upload ---
upload_speed  = 921600
; Ajuste a porta conforme o seu sistema:
; macOS:  /dev/cu.usbserial-XXXX  ou  /dev/cu.SLAB_USBtoUART
; Linux:  /dev/ttyUSB0  ou  /dev/ttyACM0
; upload_port = /dev/cu.usbserial-XXXX

; --- Flags de compilação ---
build_flags =
    ; FabGL precisa do CONFIG_SPIRAM flags explícitos no PlatformIO
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

    ; Tipo de máquina padrão em compile-time:
    ; 4 = CoCo 3 (padrão), 3 = CoCo 2
    ; Pode ser alterado em runtime pelo menu OSD (salvo em NVS)
    -DMACHINE_TYPE=4

    ; Layout de teclado PS/2 (padrão: Espanhol no original)
    ; Opções: KEYBOARD_LAYOUT_US, _ES, _UK, _DE, _IT, _FR, _BE, _NO, _JP
    -DKEYBOARD_LAYOUT_US

    ; Nível de debug (0 = desabilitado)
    -DDEBUG_LEVEL=0

    ; Stack size do loop principal
    -DARDUINO_LOOP_STACK_SIZE=8192

; --- Bibliotecas ---
lib_deps =
    ; FabGL — VGA, PS/2 keyboard, DAC audio
    ; Use a versão 1.0.9 — 2.x não é compatível com core 2.x/3.x do esp32wrover
    https://github.com/fdivitto/FabGL.git#v1.0.9

    ; SD e Preferences vêm com o core — não precisam ser declaradas

; --- Mapa de pinos (referência, não altera firmware) ---
; VGA R0/R1  : GPIO21, GPIO22
; VGA G0/G1  : GPIO18, GPIO19
; VGA B0/B1  : GPIO4,  GPIO5
; VGA HSYNC  : GPIO23
; VGA VSYNC  : GPIO15
; PS/2 KB CLK: GPIO33  | DATA: GPIO32
; PS/2 MS CLK: GPIO26  | DATA: GPIO27  (Joystick 1)
; SD CS      : GPIO13  | MOSI: GPIO12  | MISO: GPIO2  | SCK: GPIO14
; Audio DAC  : GPIO25  (DAC1 interno)

; =============================================================================
; Estrutura de SD Card necessária:
;
; /roms/
;   bas13.rom       — Color BASIC 1.3       (8 KB,  CoCo 2)
;   extbas11.rom    — Extended BASIC 1.1    (8 KB,  CoCo 2)
;   disk11.rom      — Disk BASIC 1.1        (8 KB,  CoCo 2 + CoCo 3)
;   coco3.rom       — Super Extended BASIC  (32 KB, CoCo 3) CRC: 0xb4c88d6c
;
; /disks/           — Imagens .DSK e .VDK (montáveis via OSD F3)
;
; Teclas:
;   F3 = OSD supervisor  |  F4 = Reset  |  F5 = FPS  |  ESC = BREAK
; =============================================================================

; --- Variante: se quiser manter IDF 4.2 exato (como PocketTRS) ---
; [env:ttgo-vga32-coco-idf42]
; platform    = espressif32@3.3.0
; board       = esp32wrover
; framework   = arduino
; board_build.partitions = huge_app.csv
; build_flags = ${env:ttgo-vga32-coco.build_flags}
; lib_deps    = ${env:ttgo-vga32-coco.lib_deps}